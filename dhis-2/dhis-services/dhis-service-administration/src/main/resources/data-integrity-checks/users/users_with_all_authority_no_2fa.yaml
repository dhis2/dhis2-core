---
name: users_with_all_authority_no_2fa
description: Users with the ALL authority who do not have two-factor authentication enabled
section: Users
section_order: 8
summary_sql: >-
  SELECT COUNT(*) as value,
  100.0 * COUNT(*) / NULLIF((SELECT COUNT(*) FROM userinfo), 0) as percent
  FROM userinfo
  WHERE userinfoid IN (
    SELECT userid FROM userrolemembers WHERE userroleid IN (
      SELECT DISTINCT userroleid FROM userroleauthorities WHERE authority = 'ALL'
    )
  )
  AND secret IS NULL;
details_sql: >-
  SELECT uid, username as name,
  CASE WHEN disabled THEN 'Disabled' ELSE 'Active' END as comment
  FROM userinfo
  WHERE userinfoid IN (
    SELECT userid FROM userrolemembers WHERE userroleid IN (
      SELECT DISTINCT userroleid FROM userroleauthorities WHERE authority = 'ALL'
    )
  )
  AND secret IS NULL
  ORDER BY username;
details_id_type: users
severity: CRITICAL
introduction: >
  Users with the ALL authority have unrestricted access to all data and functionality in the system.
  Two-factor authentication (2FA) provides an additional layer of security beyond a username and password.
  Users with elevated privileges such as the ALL authority are high-value targets for account compromise.
  All such users should have 2FA enabled to reduce the risk of unauthorized access.
recommendation: >
  Using the list of users provided by the details query, ensure that two-factor authentication is enabled
  for each user. Users can enable 2FA from their profile settings. Alternatively, consider whether these
  users actually require the ALL authority, and remove it from their user roles if it is not needed.
