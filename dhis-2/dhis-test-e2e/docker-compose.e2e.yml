
services:
  # Enable Postgres statement logging (csvlog) for the duration of the e2e run so the
  # n1watch step can scan it afterwards for N+1 query hot spots. Scoped to this override
  # file, so a plain `docker compose up` for local dev is unaffected. This only adds log
  # I/O; it does not change test behaviour or outcomes.
  db:
    command: >
      postgres -c max_locks_per_transaction=100
      -c logging_collector=on
      -c log_destination=csvlog
      -c log_directory=log
      -c log_filename=postgresql.log
      -c log_rotation_age=0
      -c log_rotation_size=0
      -c log_statement=all
      -c log_min_duration_statement=-1
      -c log_duration=off

  test:
    build: .
    stdin_open: true
    environment:
      DHIS2_E2E_TEST_ARGS: "${DHIS2_E2E_TEST_ARGS:-}" # to for example pass a profile like -Panalytics
      DHIS2_E2E_TEST_USER_ARGS: "${DHIS2_E2E_TEST_USER_ARGS:--Duser.default.username=admin -Duser.default.password=district}" # adjust if you for example use a demo DB dump instead of the default empty DB
    command: sh -c './wait-for-it.sh web:8080 -t 600 -- mvn test $$DHIS2_E2E_TEST_ARGS $$DHIS2_E2E_TEST_USER_ARGS --batch-mode --no-transfer-progress -Dinstance.url=http://web:8080/api -Dtest.cleanup=false -Dtest.track_called_endpoints=true -Drp.enable=true -Drp.launch=api_test_master -Drp.attributes=version:master;'
    volumes:
      - surefire-reports:/target/surefire-reports
    depends_on:
      - web
    networks:
      # Deterministic IP: switch_user_allow_listed_ips in dhis.conf is an exact match
      default:
        ipv4_address: 172.30.0.10

  reports-processor:
    profiles: ["reports"]
    image: python:3.11-slim
    volumes:
      - surefire-reports:/reports
      - ./config/scripts/process-test-reports.sh:/process-test-reports.sh:ro
    environment:
      GIT_AUTHOR_NAME: ${GIT_AUTHOR_NAME:-DHIS2 Test Bot}
      GIT_AUTHOR_EMAIL: ${GIT_AUTHOR_EMAIL:-apps@dhis2.org}
      GIT_COMMITTER_NAME: ${GIT_COMMITTER_NAME:-DHIS2 Test Bot}
      GIT_COMMITTER_EMAIL: ${GIT_COMMITTER_EMAIL:-apps@dhis2.org}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      SSH_SIGNING_KEY: ${SSH_SIGNING_KEY}
      SSH_SIGNING_PASSPHRASE: ${SSH_SIGNING_PASSPHRASE}
      DB_TYPE: ${DB_TYPE:-postgres}
      TEST_TYPE: ${TEST_TYPE:-e2e}
    command: ["/process-test-reports.sh"]

volumes:
  surefire-reports:
  
