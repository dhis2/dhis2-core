services:
  # https://docs.dhis2.org/en/manage/reference/dhisconf.html
  web:
    image: "${DHIS2_IMAGE:-dhis2/core-dev:latest}"
    cpus: 4
    mem_limit: 16gb
    environment:
      JAVA_OPTS:
        "-Dlog4j2.configurationFile=/opt/dhis2/log4j2.xml \
        -Xmx10000m -Xms10000m"
    volumes:
      - ./docker/log4j2.xml:/opt/dhis2/log4j2.xml:ro
      - ./docker/dhis.conf:/opt/dhis2/dhis.conf:ro
    ports:
      - "127.0.0.1:8080:8080" # DHIS2
    depends_on:
      db:
        condition: service_healthy

  # Healthcheck sidecar is needed for embedded tomcat images (master branch) that don't have
  # curl/wget
  web-healthcheck:
    image: curlimages/curl:latest
    network_mode: service:web
    command: ["sleep", "infinity"]
    depends_on:
      - web
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "curl --fail --silent http://localhost:8080/api/ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 120s

  # https://docs.dhis2.org/en/manage/reference/postgresql.html
  # https://www.postgresql.org/docs/16/runtime-config-resource.html#RUNTIME-CONFIG-RESOURCE-MEMORY
  # https://www.cybertec-postgresql.com/en/effective_cache_size-a-practical-example/
  # https://github.com/mastodon/mastodon/blob/fb6c22f5c275685aa644d84c003e1d6922e15d40/docker-compose.yml#L8
  # https://wiki.postgresql.org/wiki/Tuning_Your_PostgreSQL_Server
  db:
    build:
      context: ./docker
      dockerfile: Dockerfile.postgres
      args:
        POSTGRES_BASE_IMAGE: ghcr.io/baosystems/postgis:14-3.5
        DB_TYPE: "${DB_TYPE:-sierra-leone}"
        DB_VERSION: "${DB_VERSION:-dev}"
    image: localhost/dhis2-postgres:14-3.5-${DB_TYPE:-sierra-leone}-${DB_VERSION:-dev}
    cpus: 4
    mem_limit: 16gb
    shm_size: 6gb
    volumes:
      - ./docker/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    environment:
      POSTGRES_USER: &postgres_user dhis
      POSTGRES_DB: &postgres_db dhis
      POSTGRES_PASSWORD: &postgres_password dhis
      # https://www.postgresql.org/docs/current/libpq-envars.html
      PGUSER: *postgres_user
      PGDATABASE: *postgres_db
      PGPASSWORD: *postgres_password
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'psql --quiet --host=127.0.0.1 --port=5432 --set=application_name=docker --command "/** docker healthcheck **/ SELECT ''ok''" > /dev/null',
        ]
      start_period: 120s
      interval: 5s
      timeout: 3s
      retries: 5
    ports:
      - "127.0.0.1:5432:5432"

  # nginx reverse proxy with tracker request logging
  nginx:
    profiles: [logging]
    image: nginx
    ports:
      - "127.0.0.1:8081:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      - web

  # vector for parsing and ingesting nginx logs to Elasticsearch
  vector:
    profiles: [logging]
    image: timberio/vector:0.46.1-alpine
    command: ["-c", "/etc/vector/vector.toml"]
    environment:
      - ELASTIC_PASSWORD=changeme
    volumes:
      - ./docker/vector.toml:/etc/vector/vector.toml:ro
      - type: volume
        source: nginx-logs
        target: /var/log/nginx
      - certs:/etc/vector/certs:ro
    depends_on:
      nginx:
        condition: service_started
      es:
        condition: service_healthy

  # One-time setup for Elasticsearch SSL certificates and users
  elk-setup:
    profiles: [logging]
    image: docker.elastic.co/elasticsearch/elasticsearch:9.0.1
    volumes:
      - certs:/usr/share/elasticsearch/config/certs
    user: "0"
    environment:
      - ELASTIC_PASSWORD=changeme
      - KIBANA_PASSWORD=changeme
    command: >
      bash -c '
        if [ ! -f config/certs/ca.zip ]; then
          echo "Creating CA";
          bin/elasticsearch-certutil ca --silent --pem -out config/certs/ca.zip;
          unzip config/certs/ca.zip -d config/certs;
        fi;
        if [ ! -f config/certs/certs.zip ]; then
          echo "Creating certs";
          echo -ne \
          "instances:\n"\
          "  - name: es\n"\
          "    dns:\n"\
          "      - es\n"\
          "      - localhost\n"\
          "    ip:\n"\
          "      - 127.0.0.1\n"\
          > config/certs/instances.yml;
          bin/elasticsearch-certutil cert --silent --pem -out config/certs/certs.zip --in config/certs/instances.yml --ca-cert config/certs/ca/ca.crt --ca-key config/certs/ca/ca.key;
          unzip config/certs/certs.zip -d config/certs;
        fi;
        echo "Setting file permissions"
        chown -R root:root config/certs;
        find . -type d -exec chmod 750 \{\} \;;
        find . -type f -exec chmod 640 \{\} \;;
        echo "Waiting for Elasticsearch availability";
        until curl -s --cacert config/certs/ca/ca.crt https://es:9200 | grep -q "missing authentication credentials"; do sleep 30; done;
        echo "Setting kibana_system password";
        until curl -s -X POST --cacert config/certs/ca/ca.crt -u "elastic:changeme" -H "Content-Type: application/json" https://es:9200/_security/user/kibana_system/_password -d "{\"password\":\"changeme\"}" | grep -q "^{}"; do sleep 10; done;
        echo "All done!";
      '
    healthcheck:
      test: ["CMD-SHELL", "[ -f config/certs/es/es.crt ]"]
      interval: 1s
      timeout: 5s
      retries: 120

  # Elasticsearch for storing and searching tracker request logs
  es:
    profiles: [logging]
    depends_on:
      elk-setup:
        condition: service_healthy
    image: docker.elastic.co/elasticsearch/elasticsearch:9.0.1
    volumes:
      - certs:/usr/share/elasticsearch/config/certs
      - esdata:/usr/share/elasticsearch/data
    ports:
      - 9200:9200
    environment:
      - node.name=es
      - cluster.name=docker-cluster
      - cluster.initial_master_nodes=es
      - ELASTIC_PASSWORD=changeme
      - bootstrap.memory_lock=true
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=true
      - xpack.security.http.ssl.key=certs/es/es.key
      - xpack.security.http.ssl.certificate=certs/es/es.crt
      - xpack.security.http.ssl.certificate_authorities=certs/ca/ca.crt
      - xpack.security.transport.ssl.enabled=true
      - xpack.security.transport.ssl.key=certs/es/es.key
      - xpack.security.transport.ssl.certificate=certs/es/es.crt
      - xpack.security.transport.ssl.certificate_authorities=certs/ca/ca.crt
      - xpack.security.transport.ssl.verification_mode=certificate
      - xpack.license.self_generated.type=basic
      - xpack.ml.use_auto_machine_memory_percent=true
    mem_limit: 1073741824  # 1GB
    ulimits:
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -s --cacert config/certs/ca/ca.crt https://localhost:9200 | grep -q 'missing authentication credentials'",
        ]
      interval: 10s
      timeout: 10s
      retries: 120

  # Kibana UI for visualizing and analyzing tracker request logs
  kibana:
    profiles: [logging]
    depends_on:
      es:
        condition: service_healthy
    image: docker.elastic.co/kibana/kibana:9.0.1
    volumes:
      - certs:/usr/share/kibana/config/certs
      - kibanadata:/usr/share/kibana/data
    ports:
      - 5601:5601
    environment:
      - SERVERNAME=kibana
      - ELASTICSEARCH_HOSTS=https://es:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=changeme
      - ELASTICSEARCH_SSL_CERTIFICATEAUTHORITIES=config/certs/ca/ca.crt
    mem_limit: 1073741824  # 1GB
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -s -I http://localhost:5601 | grep -q 'HTTP/1.1 302 Found'",
        ]
      interval: 10s
      timeout: 10s
      retries: 120

  # Import Kibana dashboards and visualizations from NDJSON files
  kibana-setup:
    profiles: [logging]
    image: curlimages/curl:latest
    depends_on:
      kibana:
        condition: service_healthy
    volumes:
      - ./docker/kibana-dashboards:/dashboards
    environment:
      - KIBANA_PASSWORD=changeme
    command: >
      sh -c '
        echo "Waiting for Kibana to be ready..."
        until curl -s -I http://kibana:5601 | grep -q "HTTP/1.1 302 Found"; do
          sleep 10
        done
        echo "Kibana is ready"

        # Check for NDJSON files (standard Kibana export format)
        if [ -d /dashboards ] && [ "$$(ls -A /dashboards/*.ndjson 2>/dev/null)" ]; then
          echo "Importing saved objects from NDJSON files..."
          for dashfile in /dashboards/*.ndjson; do
            echo "Importing $$dashfile..."
            curl -X POST "http://kibana:5601/api/saved_objects/_import?overwrite=true" \
              -H "kbn-xsrf: true" \
              -u "elastic:$$KIBANA_PASSWORD" \
              --form file=@$$dashfile
            echo ""
          done
          echo "Saved objects import completed"
        else
          echo "No NDJSON files found in /dashboards directory"
        fi
      '

volumes:
  nginx-logs:
    driver: local
  certs:
    driver: local
  esdata:
    driver: local
  kibanadata:
    driver: local

