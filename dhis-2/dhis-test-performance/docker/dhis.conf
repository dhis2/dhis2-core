connection.dialect = org.hibernate.dialect.PostgreSQLDialect
connection.driver_class = org.postgresql.Driver
connection.url = jdbc:postgresql://db/dhis
connection.username = dhis
connection.password = dhis

system.update_notifications_enabled = off

# DHIS2-20965 diagnostics: surface pool contention without changing the
# DataSource (logging.query=on wraps the DataSource in datasource-proxy and was
# found to perturb the bimodal reproduction). Hikari leak detection is a pure
# timer inside Hikari and does not wrap the DataSource.
connection.pool.warn_max_age = 5000

# Debugging: prepend SQL comments with request context for query attribution.
# This can influence performance as unique comments prevent prepared statement caching.
#monitoring.sql.context = on
#monitoring.sql.context.keys = controller,method,requestId,sessionId
