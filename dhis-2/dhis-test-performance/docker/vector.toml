[api]
enabled = true

# the source name is used as ES index name and its suffix is used to tag the implementation in the indexed data
[sources.nginx_local]
type = "file"
include = ["/var/log/nginx/tracker_access.log"]
read_from = "beginning"

# this awkward workaround is needed as there does not seem to be a way to access the source id
# https://github.com/vectordotdev/vector/discussions/11934
[transforms.nginx_with_implementation_local]
type = "remap"
inputs = ["nginx_local"]
source = '''
  .implementation = "local"
'''

# =====================================================
# TRANSFORM CONFIGURATION - PARSES NGINX LOGS
# =====================================================
[transforms.parse_nginx]
type = "remap"
inputs = ["nginx_with_implementation_local"]
source = '''
  # parse tracker_log format directly as defined in nginx.conf
  parsed, err = parse_csv(.message, "|")

  if err != null {
    log("Unable to parse nginx log line: " + err, level: "error")
  } else {
    # map the parsed fields to structured JSON matching the nginx tracker_log format
    .@timestamp = parsed[0]
    msec = to_float!(parsed[1])
    .request_method = parsed[2]
    .uri = parsed[3]
    if parsed[4] != "" && parsed[4] != "-"  {
      .query_string = parse_query_string!(parsed[4])
    }
    .status = to_int!(parsed[5])
    .request_completion = parsed[6]
    .request_id = parsed[7]

    # no value is indicated by "-" in the nginx logs, only add fields with values
    # to make querying in ES easier and to not mess with the autodetected data type in its index
    if parsed[8] != "-" {
      .referer = parsed[8]
    }
    if parsed[9] != "-" {
      .user_agent = parsed[9]
    }
    .bytes_sent = to_int!(parsed[10])
    .body_bytes_sent = to_int!(parsed[11])
    .connection = to_int!(parsed[12])
    .connection_requests = to_int!(parsed[13])
    # time in seconds with a milliseconds resolution
    .connection_time_ms = to_float!(parsed[14]) * 1000
    request_time_seconds = to_float!(parsed[15])
    .request_time_ms = request_time_seconds * 1000
    .upstream_connect_time_ms = to_float!(parsed[16]) * 1000
    .upstream_header_time_ms = to_float!(parsed[17]) * 1000
    .upstream_response_time_ms = to_float!(parsed[18]) * 1000

    if parsed[19] != "-" {
      .sessionid_hash = parsed[19]
    }

    # calculate request arrival time: msec - request_time = when request was received
    # msec is float with millisecond precision, convert to milliseconds for timestamp
    request_received_ms = to_int((msec - request_time_seconds) * 1000)
    response_sent_ms = to_int(msec * 1000)
    .request_received_at = from_unix_timestamp!(request_received_ms, unit: "milliseconds")
    # also store response sent time for comparison
    .response_sent_at = from_unix_timestamp!(response_sent_ms, unit: "milliseconds")

    # add common Elasticsearch metadata fields
    .type = "tracker_requests"
  }

  del(.host)
'''

# =====================================================
# SINK CONFIGURATION FOR ELASTICSEARCH
# =====================================================
# use this sink when running with the full ELK stack (docker compose --profile logs up)
[sinks.elasticsearch]
type = "elasticsearch"
inputs = ["parse_nginx"]
endpoints = ["https://es:9200"]
bulk.action = "create"
# TODO how to make this dynamic?
#bulk.index = "tracker-{{.implementation}}"
bulk.index = "tracker-local"
compression = "gzip"
# elasticsearch authentication (required for Elasticsearch 9.x)
auth.strategy = "basic"
auth.user = "elastic"
auth.password = "${ELASTIC_PASSWORD}"
# SSL configuration (required for secure Elasticsearch setup)
tls.ca_file = "/etc/vector/certs/ca/ca.crt"
tls.verify_certificate = true
tls.verify_hostname = true

