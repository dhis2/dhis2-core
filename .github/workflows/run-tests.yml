name: Test
env:
  # This is to make sure Maven don't timeout fetching dependencies. See: https://github.com/actions/virtual-environments/issues/1499
  MAVEN_OPTS: -Dhttp.keepAlive=false -Dmaven.wagon.http.pool=false -Dmaven.wagon.http.retryHandler.class=standard -Dmaven.wagon.http.retryHandler.count=3 -Dmaven.wagon.httpconnectionManager.ttlSeconds=125
  # PR → quiet (unless ci-verbose label), push/schedule → info, workflow_dispatch → user choice
  MAVEN_ARGS: ${{ (inputs.maven_log == 'debug' && '-X') || (github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'ci-verbose') && '-q') || (inputs.maven_log == 'quiet' && '-q') || '' }}
  # Controls log4j2 suppression of expected test errors. ci-verbose label sets to error to show them.
  TEST_LOG_SUPPRESSED_LEVEL: ${{ (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'ci-verbose') && 'error') || (inputs.maven_log == 'debug' && 'error') || 'off' }}
on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:
    inputs:
      maven_log:
        description: "Maven log verbosity"
        required: false
        default: "quiet"
        type: choice
        options:
          - quiet
          - info
          - debug
concurrency:
  group: ${{ github.workflow}}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Build the reactor ONCE per CI run, instead of every one of the 6 test jobs
  # recompiling it.
  #
  # ~99% of every test job used to be one `mvn clean test` on the full ~39-module
  # reactor — i.e. the same compile paid 6×. This job pays it once and hands the
  # compiled output to the test jobs, which then skip the main compile (see
  # `-Dmaven.main.skip=true` below).
  #
  # Incremental across runs: the Apache Maven Build Cache extension hashes each
  # module's inputs and restores unchanged modules instead of recompiling them, so
  # a PR touching a few modules only recompiles those (+ dependents). install:install
  # is forced on cache hits (executionControl/runAlways) so a restored module's jar
  # still lands in ~/.m2 — without that, a rebuilt downstream module can't resolve a
  # cache-restored upstream one (the cross-module resolution failure proven in #24032).
  #
  # ALL build-cache machinery lives in THIS job only. The extension config is
  # materialized on the runner here (never committed — see .gitignore), so local
  # `mvn` invocations and every other CI job load no extension and behave exactly
  # as before. The cache store only ever exists on this ephemeral, single-purpose
  # runner; actions/cache is branch-scoped, immutable and read-only on restore, so
  # concurrent CI runs cannot corrupt it, and the input-hash gate means a stale
  # restore can only ever cause a recompile, never wrong output.
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: temurin
          cache: maven
      # Materialize the build-cache extension + config on the runner ONLY. Kept out
      # of the repo (.gitignore) so a local `mvn` never loads it — local builds and
      # the multi-branch cache-staleness risk that comes with a shared local store
      # are entirely avoided; the cache is a CI-only concern.
      - name: Enable build cache (CI-only)
        run: |
          set -euo pipefail
          mkdir -p dhis-2/.mvn
          cat > dhis-2/.mvn/extensions.xml <<'XML'
          <?xml version="1.0" encoding="UTF-8"?>
          <extensions xmlns="http://maven.apache.org/EXTENSIONS/1.0.0"
                      xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                      xsi:schemaLocation="http://maven.apache.org/EXTENSIONS/1.0.0 https://maven.apache.org/xsd/core-extensions-1.0.0.xsd">
            <extension>
              <groupId>org.apache.maven.extensions</groupId>
              <artifactId>maven-build-cache-extension</artifactId>
              <version>1.2.3</version>
            </extension>
          </extensions>
          XML
          cat > dhis-2/.mvn/maven-build-cache-config.xml <<'XML'
          <?xml version="1.0" encoding="UTF-8"?>
          <cache xmlns="http://maven.apache.org/BUILD-CACHE-CONFIG/1.0.0"
                 xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                 xsi:schemaLocation="http://maven.apache.org/BUILD-CACHE-CONFIG/1.0.0 https://maven.apache.org/xsd/build-cache-config-1.0.0.xsd">
            <configuration>
              <!-- Enabled via -Dmaven.build.cache.enabled=true on this job's mvn line. -->
              <enabled>false</enabled>
              <hashAlgorithm>XX</hashAlgorithm>
              <validateXml>true</validateXml>
              <remote enabled="false"/>
              <local>
                <maxBuildsCached>3</maxBuildsCached>
              </local>
              <!--
                On a cache hit the extension restores a module's published jar into ~/.m2
                but does NOT, by default, repopulate the target/classes directory on disk.
                The test jobs need every module's target/classes present (they're packaged
                into the artifact and used to test-compile + instrument), so cache `classes`
                explicitly — otherwise a warm build ships empty class dirs and the test jobs
                fail to compile. (test-classes is deliberately NOT cached: the test jobs
                recompile test sources themselves.)
              -->
              <attachedOutputs>
                <dirNames>
                  <dirName>classes</dirName>
                </dirNames>
              </attachedOutputs>
            </configuration>
            <!--
              On a cache hit the extension restores a module's compiled output and skips
              the goals that produced it. We force install:install to ALWAYS run so the
              restored jar is (re)installed into ~/.m2 — otherwise a downstream module that
              DID rebuild cannot resolve a cache-restored upstream module (the cross-module
              resolution failure seen on a warm cache in #24032). This job runs no tests
              (-DskipTests), so there is nothing else to force.
            -->
            <executionControl>
              <runAlways>
                <executions>
                  <execution artifactId="maven-install-plugin">
                    <execIds>
                      <execId>default-install</execId>
                    </execIds>
                  </execution>
                </executions>
              </runAlways>
            </executionControl>
          </cache>
          XML
      # Persist the build-cache store across runs. Key is unique per commit (always
      # saves a fresh generation); restore-keys falls back to the newest prior cache
      # for this branch and — on a PR — the base branch (master), so even a PR's first
      # run recompiles only what it changed.
      - name: Restore/persist incremental build cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.build-cache
          key: build-cache-${{ github.sha }}
          restore-keys: |
            build-cache-
      - name: Build reactor once (compile + install, no tests)
        # -DskipTests: no tests here (jacoco's <skip> is ${skipTests}, so no coverage data
        #  is produced or expected in this job — the test jobs produce it).
        # -Dmaven.build.cache.enabled=true opts THIS invocation into the build cache
        #  (off by default in the config above).
        run: >
          mvn clean install -DskipTests --threads 2C --batch-mode --no-transfer-progress --update-snapshots
          --file ./dhis-2/pom.xml
          -Dmaven.build.cache.enabled=true
          -Dmaven.build.cache.location=${{ github.workspace }}/.build-cache
        timeout-minutes: 30
      # Hand the compiled reactor to the test jobs: every module's target/classes (so
      # the test jobs skip the main compile and jacoco can instrument the same classes)
      # plus the installed reactor jars (resolution insurance for inter-module deps).
      - name: Package compiled reactor for test jobs
        run: |
          set -euo pipefail
          find dhis-2 -type d -path '*/target/classes' -print0 \
            | tar --null --files-from=- -czf reactor-classes.tgz
          echo "Packaged $(find dhis-2 -type d -path '*/target/classes' | wc -l) target/classes directories"
          tar -czf reactor-m2.tgz -C "$HOME/.m2/repository" org/hisp/dhis
      - uses: actions/upload-artifact@v7
        with:
          name: compiled-reactor
          path: |
            reactor-classes.tgz
            reactor-m2.tgz
          retention-days: 1
          if-no-files-found: error

  unit-test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: temurin
          cache: maven
      # Restore the compiled reactor from the build job. The test command below skips
      # the main compile, so these classes must be in place first.
      - uses: actions/download-artifact@v7
        with:
          name: compiled-reactor
      - name: Restore compiled reactor
        run: |
          set -euo pipefail
          tar -xzf reactor-classes.tgz
          mkdir -p "$HOME/.m2/repository"
          tar -xzf reactor-m2.tgz -C "$HOME/.m2/repository"
          echo "Restored $(find dhis-2 -type d -path '*/target/classes' | wc -l) target/classes directories"
      - name: Run unit tests
        # NO `clean` (would wipe the restored classes) and -Dmaven.main.skip=true (the
        # build job already compiled main). Test sources still compile here; surefire +
        # jacoco run via the normal `test` lifecycle, so coverage is identical to before.
        run: mvn test --threads 2C --batch-mode --no-transfer-progress --update-snapshots --file ./dhis-2/pom.xml --activate-profiles unit-test -Dmaven.main.skip=true
        timeout-minutes: 30
      - name: Report coverage to codecov
        uses: codecov/codecov-action@v3
        with:
          directory: ./dhis-2
          flags: unit
          fail_ci_if_error: false
          verbose: true
      # delete the next 2 steps once we are confident in the coverage setup
      - name: Tar jacoco coverage report to debug
        run: tar -cvf coverage.tar dhis-2/dhis-test-coverage/target/site/jacoco-aggregate
      - uses: actions/upload-artifact@v7
        name: Upload jacoco coverage report to debug
        with:
          name: unit-test-coverage
          path: coverage.tar
          retention-days: 5
      - name: Generate surefire aggregate report
        run: mvn surefire-report:report-only -Daggregate=true --batch-mode --no-transfer-progress --file ./dhis-2/pom.xml --projects -dhis-test-coverage
      # tar due to https://github.com/actions/upload-artifact/blob/3cea5372237819ed00197afe530f5a7ea3e805c8/README.md?plain=1#L254
      - name: Tar surefire individual reports
        run: find . -name "surefire-reports" -type d -exec find {} -type f -name "*.xml" -printf '%p\0' \; | tar --null --files-from=- -cvf surefire_reports.tar
      - name: Archive surefire reports
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-surefire-reports
          path: |
            dhis-2/target/site/surefire-report.html
            surefire_reports.tar
          retention-days: 5

  # The integration-test suite is the slowest part of CI, so it is split across a
  # matrix of shards that run in parallel, each on its own runner with its own
  # Testcontainers Postgres. Each shard runs a disjoint, interleaved slice of the
  # surefire test-candidate classes (see "Compute shard test includes"); the
  # integration-test profile's `groups=integration` tag filter then runs ONLY
  # integration-tagged tests, so over-included unit/H2/abstract classes are skipped.
  # The union of all shards is the full candidate set, so no integration test can be
  # silently dropped. The aggregating integration-test job sums the per-shard results
  # so coverage parity (sum of shards == full suite) is visible in every run's summary.
  #
  # This matrix job is intentionally NOT named `integration-test`: a matrix reports its
  # checks as `integration-test-shard (0..N)`, which would never satisfy a branch-
  # protection rule that requires the bare name. The aggregating `integration-test` job
  # below provides that stable required-check name and gates on every shard's result.
  # NOTE: keep SHARD_TOTAL equal to the length of matrix.shard.
  integration-test-shard:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]
    env:
      SHARD_TOTAL: "4"
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: temurin
          cache: maven
      - uses: actions/download-artifact@v7
        with:
          name: compiled-reactor
      - name: Restore compiled reactor
        run: |
          set -euo pipefail
          tar -xzf reactor-classes.tgz
          mkdir -p "$HOME/.m2/repository"
          tar -xzf reactor-m2.tgz -C "$HOME/.m2/repository"
          echo "Restored $(find dhis-2 -type d -path '*/target/classes' | wc -l) target/classes directories"
      - name: Compute shard test includes
        env:
          SHARD_INDEX: ${{ matrix.shard }}
        run: |
          set -euo pipefail
          find dhis-2 -path '*/src/test/java/*' -type f \
            \( -name 'Test*.java' -o -name '*Test.java' -o -name '*Tests.java' -o -name '*TestCase.java' \) \
            | sed -E 's#.*/src/test/java/##' \
            | LC_ALL=C sort -u \
            | awk -v idx="$SHARD_INDEX" -v total="$SHARD_TOTAL" 'NR % total == idx { print "**/" $0 }' \
            > "$GITHUB_WORKSPACE/shard-includes.txt"
          echo "Shard $SHARD_INDEX of $SHARD_TOTAL: $(wc -l < "$GITHUB_WORKSPACE/shard-includes.txt") candidate include patterns"
          head -n 5 "$GITHUB_WORKSPACE/shard-includes.txt"
      - name: Run integration tests (shard ${{ matrix.shard }}/${{ env.SHARD_TOTAL }})
        # NO `clean` (would wipe the restored classes) and -Dmaven.main.skip=true (the
        # build job already compiled main). See the build job for the build-once rationale.
        run: >
          mvn test --threads 2C --batch-mode --no-transfer-progress --update-snapshots
          --file ./dhis-2/pom.xml --activate-profiles integration-test
          -Dmaven.main.skip=true
          -Dsurefire.includesFile=$GITHUB_WORKSPACE/shard-includes.txt
        timeout-minutes: 30
      - uses: actions/upload-artifact@v7
        name: Upload test logs on failure
        if: failure()
        with:
          name: integration-test-logs-${{ matrix.shard }}
          path: "**/target/test.log"
          if-no-files-found: error # check our logging configuration if that happens
          retention-days: 3
      - name: Report coverage to codecov
        uses: codecov/codecov-action@v3
        with:
          directory: ./dhis-2
          flags: integration
          fail_ci_if_error: false
          verbose: true
      # tar due to https://github.com/actions/upload-artifact/blob/3cea5372237819ed00197afe530f5a7ea3e805c8/README.md?plain=1#L254
      - name: Tar surefire individual reports
        if: always()
        run: find . -name "surefire-reports" -type d -exec find {} -type f \( -name "*.xml" -o -name "*.txt" \) -printf '%p\0' \; | tar --null --files-from=- -cvf surefire_reports.tar
      - name: Archive surefire reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: integration-test-surefire-reports-${{ matrix.shard }}
          path: surefire_reports.tar
          retention-days: 5

  # Aggregating gate for the sharded integration tests. This job carries the stable
  # `integration-test` name that branch protection requires as a status check, combines
  # the per-shard surefire reports into a single run-summary table (so coverage parity
  # across shards is visible at a glance), and then fails if ANY shard did not succeed.
  # `needs.integration-test-shard.result` collapses the whole matrix to `success` only
  # when every leg passed, so this gate cannot go green while a shard is red.
  integration-test:
    runs-on: ubuntu-latest
    needs: integration-test-shard
    if: always()
    steps:
      - uses: actions/download-artifact@v7
        with:
          pattern: integration-test-surefire-reports-*
          path: shard-reports
      - name: Combine shard test counts
        run: |
          set -euo pipefail
          sumattr() { find "$1" -name 'TEST-*.xml' -exec grep -hoE "$2=\"[0-9]+\"" {} + 2>/dev/null | grep -oE '[0-9]+' | awk '{s+=$1} END{print s+0}'; }
          tot_c=0; tot_t=0; tot_f=0; tot_e=0; tot_s=0
          {
            echo "## Integration test shards"
            echo ""
            echo "| Shard | Classes | Tests | Failures | Errors | Skipped |"
            echo "|------:|--------:|------:|---------:|-------:|--------:|"
          } >> "$GITHUB_STEP_SUMMARY"
          for tar in shard-reports/*/surefire_reports.tar; do
            [ -f "$tar" ] || continue
            shard=$(basename "$(dirname "$tar")" | sed 's/.*-//')
            d=$(mktemp -d); tar -xf "$tar" -C "$d"
            c=$(find "$d" -name 'TEST-*.xml' | wc -l)
            t=$(sumattr "$d" tests); f=$(sumattr "$d" failures); e=$(sumattr "$d" errors); s=$(sumattr "$d" skipped)
            echo "| $shard | $c | $t | $f | $e | $s |" >> "$GITHUB_STEP_SUMMARY"
            tot_c=$((tot_c+c)); tot_t=$((tot_t+t)); tot_f=$((tot_f+f)); tot_e=$((tot_e+e)); tot_s=$((tot_s+s))
            rm -rf "$d"
          done
          echo "| **Total** | **$tot_c** | **$tot_t** | **$tot_f** | **$tot_e** | **$tot_s** |" >> "$GITHUB_STEP_SUMMARY"
      - name: Fail if any shard failed
        if: needs.integration-test-shard.result != 'success'
        run: |
          echo "::error::integration-test-shard result was '${{ needs.integration-test-shard.result }}' (one or more shards did not succeed)"
          exit 1

  integration-h2-test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: temurin
          cache: maven
      - uses: actions/download-artifact@v7
        with:
          name: compiled-reactor
      - name: Restore compiled reactor
        run: |
          set -euo pipefail
          tar -xzf reactor-classes.tgz
          mkdir -p "$HOME/.m2/repository"
          tar -xzf reactor-m2.tgz -C "$HOME/.m2/repository"
          echo "Restored $(find dhis-2 -type d -path '*/target/classes' | wc -l) target/classes directories"
      - name: Run integration h2 tests
        # NO `clean` and -Dmaven.main.skip=true — see the build job for the rationale.
        run: mvn test --threads 2C --batch-mode --no-transfer-progress --update-snapshots --file ./dhis-2/pom.xml --activate-profiles integration-h2-test -Dmaven.main.skip=true
        timeout-minutes: 30
      - uses: actions/upload-artifact@v7
        name: Upload test logs on failure
        if: failure()
        with:
          name: integration-h2-test-logs
          path: "**/target/test.log"
          if-no-files-found: error # check our logging configuration if that happens
          retention-days: 3
      - name: Report coverage to codecov
        uses: codecov/codecov-action@v3
        with:
          directory: ./dhis-2
          flags: integration-h2
          fail_ci_if_error: false
          verbose: true
      # delete the next 2 steps once we are confident in the coverage setup
      - name: Tar jacoco coverage report to debug
        run: tar -cvf coverage.tar dhis-2/dhis-test-coverage/target/site/jacoco-aggregate
      - uses: actions/upload-artifact@v7
        name: Upload jacoco coverage report to debug
        with:
          name: integration-h2-test-coverage
          path: coverage.tar
          retention-days: 5
      - name: Generate surefire aggregate report
        run: mvn surefire-report:report-only -Daggregate=true --batch-mode --no-transfer-progress --file ./dhis-2/pom.xml --projects -dhis-test-coverage
      # tar due to https://github.com/actions/upload-artifact/blob/3cea5372237819ed00197afe530f5a7ea3e805c8/README.md?plain=1#L254
      - name: Tar surefire individual reports
        run: find . -name "surefire-reports" -type d -exec find {} -type f -name "*.xml" -printf '%p\0' \; | tar --null --files-from=- -cvf surefire_reports.tar
      - name: Archive surefire reports
        uses: actions/upload-artifact@v7
        with:
          name: integration-h2-test-surefire-reports
          path: |
            dhis-2/target/site/surefire-report.html
            surefire_reports.tar
          retention-days: 5

  # Dependency hygiene check (declared-but-unused / used-but-undeclared deps). Was a step
  # in unit-test, but `dependency:analyze` forks a build up to test-compile, which recompiled
  # main and defeated the build-once skip there. Split into its own job: it restores the
  # compiled reactor and runs with -Dmaven.main.skip=true (no main recompile), in parallel
  # off the critical path.
  dependency-analysis:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: temurin
          cache: maven
      - uses: actions/download-artifact@v7
        with:
          name: compiled-reactor
      - name: Restore compiled reactor
        run: |
          set -euo pipefail
          tar -xzf reactor-classes.tgz
          mkdir -p "$HOME/.m2/repository"
          tar -xzf reactor-m2.tgz -C "$HOME/.m2/repository"
      - name: Run dependency analysis
        run: mvn dependency:analyze --batch-mode --no-transfer-progress --file ./dhis-2/pom.xml -Dmaven.main.skip=true
        timeout-minutes: 10

  send-slack-message:
    runs-on: ubuntu-latest
    if: |
      always() &&
      contains(needs.*.result, 'failure') &&
      github.ref == 'refs/heads/master'

    needs: [build, unit-test, integration-test, integration-h2-test, dependency-analysis]
    steps:
      - uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_BACKEND_WEBHOOK }}
          SLACK_CHANNEL: "team-backend"
          SLACK_MESSAGE: "Latest test run on master failed and needs investigation :detective-duck:. \n Commit message: ${{ github.event.head_commit.message }}"
          SLACK_COLOR: "#ff0000"
