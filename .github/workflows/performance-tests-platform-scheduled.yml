# Scheduled performance tests for platform - runs a matrix of tests on a schedule
name: Performance tests platform scheduled
run-name: Performance tests platform scheduled

on:
  # NOTE: workflow_dispatch is only to test this workflow! Use ./performance-tests.yml to test a
  # single DHIS2 version and ./performance-tests-compare.yml if you want to compare a baseline
  # version against a candidate
  workflow_dispatch:
  schedule:
    # Run at 3 AM UTC every day (offset from tracker tests at 1 AM to avoid runner contention)
    - cron: "0 3 * * *"

jobs:
  run-scheduled-tests:
    name: ${{ matrix.name }}
    if: github.repository == 'dhis2/dhis2-core'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: users-smoke
            env: |
              DHIS2_IMAGE=dhis2/core-dev:latest
              SIMULATION_CLASS=org.hisp.dhis.test.platform.UsersPerformanceTest
              WARMUP=2
              MVN_ARGS=-Diterations=3
            slack_webhook_secret: SLACK_WEBHOOK_PLATFORM_PERFORMANCE
          - name: users-load
            env: |
              DHIS2_IMAGE=dhis2/core-dev:latest
              SIMULATION_CLASS=org.hisp.dhis.test.platform.UsersPerformanceTest
              MVN_ARGS=-Diterations=10
            slack_webhook_secret: SLACK_WEBHOOK_PLATFORM_PERFORMANCE
    uses: ./.github/workflows/performance-tests.yml
    with:
      perf_tests_git_ref: master
      test_env: ${{ matrix.env }}
      test_name: ${{ matrix.name }}
    secrets:
      slack_webhook: ${{ secrets[matrix.slack_webhook_secret] }}